name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.0
          install-mode: binary
          skip-pkg-cache: true
          skip-build-cache: true
      - run: make ci

  e2e-linux:
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install zellij
        run: |
          curl -L https://github.com/zellij-org/zellij/releases/latest/download/zellij-x86_64-unknown-linux-musl.tar.gz | tar xz
          sudo mv zellij /usr/local/bin/
          zellij --version

      - name: Install nono
        run: |
          curl -fsSL https://nono.sh/install.sh | bash
          echo "$HOME/.nono/bin" >> "$GITHUB_PATH"

      - name: Build workbench
        run: go build -ldflags="-s -w" -o dist/workbench .

      - name: Run e2e tests
        run: PATH="$(pwd)/dist:$PATH" bash scripts/e2e.sh
