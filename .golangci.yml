version: "2"

linters:
  default: standard
  enable:
    - bodyclose
    - copyloopvar
    - errname
    - errorlint
    - exhaustive
    - goconst
    - gocritic
    - misspell
    - nakedret
    - nilerr
    - noctx
    - prealloc
    - unconvert
    - unparam
    - whitespace
  disable:
    - gosec
  settings:
    errorlint:
      asserts: false
    goconst:
      min-occurrences: 6
    gocritic:
      disabled-checks:
        - appendAssign
    revive:
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
        - name: unused-parameter
          disabled: true

formatters:
  enable:
    - gofmt
